load_module /usr/lib/nginx/modules/ngx_http_geoip2_module.so;

events {
    worker_connections 1024;
}

http {
    # Trust X-Forwarded-For only from local caller (for local testing/proxy).
    set_real_ip_from 127.0.0.1;
    set_real_ip_from ::1;
    real_ip_header X-Forwarded-For;
    real_ip_recursive on;

    geoip2 "/mnt/e/education/NSU/computer networks/07 ip block/GeoLite2-Country.mmdb" {
        $geoip2_country_code country iso_code;
    }

    map $geoip2_country_code $block_ru {
        default 0;
        RU      1;
    }

    server {
        listen 80;

        location / {
            if ($block_ru) {
                return 403;
            }

            proxy_pass http://all;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }

    upstream all {
        server 127.0.0.1:8080;
    }
}