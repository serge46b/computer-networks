events {
    worker_connections 1024;
}

http {
    upstream task05 {
        server 127.0.0.1:8080;
    }

    server {
        listen 80;
        
        location / {
            proxy_pass http://task05;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}